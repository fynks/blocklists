<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocklists Collection</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='1em' height='1em' viewBox='0 0 24 24'><path fill='red' d='M7.775 0a1.8 1.8 0 0 0-1.273.527L.528 6.503A1.8 1.8 0 0 0 0 7.775v8.45c0 .478.19.936.528 1.274l5.974 5.974A1.8 1.8 0 0 0 7.775 24h8.45a1.8 1.8 0 0 0 1.273-.527l5.975-5.974A1.8 1.8 0 0 0 24 16.225v-8.45a1.8 1.8 0 0 0-.527-1.272L17.498.527A1.8 1.8 0 0 0 16.225 0zm4.427 3c1.02 0 .958 1.108.958 1.108v6.784s-.009.218.16.218c.188 0 .175-.226.175-.226l-.002-5.63s-.05-.986.959-.986c1.01 0 .97.983.97.983v7.621s.014.158.141.158s.944-2.122.944-2.122s.451-1.497 2.576-1.1c.038.008-.167.688-.167.688l-2.283 6.556S15.69 20.7 11.714 20.7c-5.044 0-4.808-5.407-4.814-5.405V7.562s-.016-.99.897-.99c.858 0 .849.99.849.99l.007 3.583s-.004.172.167.172c.16 0 .141-.172.141-.172l.01-5.926s-.055-1.162.966-1.162c1.04 0 .983 1.142.983 1.142v5.611s-.005.204.152.204c.168 0 .154-.206.154-.206l.01-6.693S11.18 3 12.202 3'/></svg>"
        type="image/svg+xml">
    <style>
 *{ margin: 0; padding: 0; box-sizing: border-box;} :root{ --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #5cf6c5; --accent: #10b981; --background: #f8fafc; --surface: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b; --text-muted: #94a3b8; --border: #e2e8f0; --success: #10b981; --error: #ef4444; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1); --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1rem; --transition: all 0.2s ease;} [data-theme="dark"]{ --primary: #818cf8; --primary-dark: #6366f1; --secondary: #a78bfa; --background: #0f172a; --surface: #1e293b; --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8; --border: #334155; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.2); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3); --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);} body{ font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background-color: var(--background); color: var(--text-primary); line-height: 1.6; min-height: 100vh; padding: 2rem 1rem; transition: var(--transition);} .container{ max-width: 1240px; margin: 0 auto;} .icon{ width: 1.1rem; height: 1.1rem; display: inline-block; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;} header{ text-align: center; margin-bottom: 2.5rem; position: relative;} .theme-toggle{ position: absolute; top: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); box-shadow: var(--shadow-sm);} .theme-toggle:hover{ transform: translateY(-2px); box-shadow: var(--shadow-md);} .theme-toggle .icon{ width: 1.2rem; height: 1.2rem; color: var(--text-primary);} h1{ font-size: 2.5rem; font-weight: 800; margin-bottom: 0.75rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;} .subtitle{ font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 1.5rem;} .controls-row{ max-width: 980px; margin: 0 auto 2rem; display: grid; grid-template-columns: minmax(340px, 1fr) auto; gap: 1rem; align-items: center;} .search-container{ position: relative; max-width: none; margin: 0;} .search-container input{ width: 100%; padding: 0.875rem 1rem 0.875rem 3rem; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); font-size: 1rem; box-shadow: var(--shadow-sm); transition: var(--transition);} .search-container input:focus{ outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);} .search-icon{ position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);} .stats{ margin: 0; display: flex; justify-content: flex-end; gap: 1rem;} .stat-card{ background: var(--surface); border-radius: var(--radius-md); padding: 0.9rem 1.15rem; text-align: center; box-shadow: var(--shadow-sm); min-width: 180px;} .stat-value{ font-size: 1.75rem; font-weight: 700; color: rgba(255, 255, 0, 0.404); margin-bottom: 0.25rem;} .stat-label{ font-size: 0.875rem; color: var(--text-secondary);} .loading{ text-align: center; padding: 3rem 1rem;} .spinner{ width: 3rem; height: 3rem; border: 3px solid rgba(99, 102, 241, 0.2); border-top: 3px solid var(--primary); border-radius: 50%; margin: 0 auto 1.5rem; animation: spin 1s linear infinite;} @keyframes spin{ 0%{ transform: rotate(0deg);} 100%{ transform: rotate(360deg);}} .blocklist-grid{ display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1.15rem; margin-bottom: 2.5rem;} .blocklist-card{ background: var(--surface); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: var(--transition); display: flex; flex-direction: column; height: 100%;} .blocklist-card:hover{ transform: translateY(-3px); box-shadow: var(--shadow-md);} .blocklist-header{ margin-bottom: 1.1rem;} .blocklist-title{ font-size: 1.25rem; font-weight: 600; color: var(--text-primary);} .url-field{ margin-bottom: 1rem;} .url-label{ display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem;} .blocklist-url{ background: rgba(241, 245, 249, 0.5); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.875rem 1rem; font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; font-size: 0.875rem; color: var(--text-secondary); word-break: break-all; position: relative; overflow: hidden;} [data-theme="dark"] .blocklist-url{ background: rgba(30, 41, 59, 0.5);} .blocklist-url::before{ content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent);} .blocklist-actions{ margin-top: auto; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem;} .btn{ padding: 0.625rem 1.25rem; border-radius: var(--radius-sm); font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: var(--transition); border: none; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;} .btn-primary{ background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;} .btn-primary:hover{ background: linear-gradient(135deg, var(--primary-dark), var(--secondary)); transform: translateY(-1px); box-shadow: var(--shadow-md);} .btn-outline{ background: transparent; border: 1px solid var(--border); color: var(--text-primary);} .btn-outline:hover{ background: rgba(99, 102, 241, 0.05); border-color: var(--primary);} .btn-success{ background: var(--accent); color: white;} .btn-success:hover{ background: #059669; transform: translateY(-1px); box-shadow: var(--shadow-md);} .error{ background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: var(--radius-md); padding: 2rem; text-align: center; color: var(--error); margin-bottom: 2rem;} .error h3{ margin-bottom: 0.75rem;} .error p{ color: var(--text-secondary);} footer{ text-align: center; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 0.9rem;} footer a{ color: var(--primary); text-decoration: none;} footer a:hover{ text-decoration: underline;} .notification{ position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.5rem; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 0.75rem; transform: translateY(100px); opacity: 0; transition: var(--transition); z-index: 1000;} .notification.show{ transform: translateY(0); opacity: 1;} .notification .icon{ color: var(--success);} @media (max-width: 1100px){ .container{ max-width: 900px;} .controls-row{ grid-template-columns: 1fr;} .stats{ justify-content: center;} .blocklist-grid{ grid-template-columns: 1fr;}} @media (max-width: 768px){ body{ padding: 1rem;} h1{ font-size: 2rem;} .subtitle{ font-size: 1rem;} .blocklist-card{ padding: 1.25rem;} .blocklist-actions{ grid-template-columns: 1fr;} .btn{ width: 100%;}} @media (max-width: 480px){ header{ margin-bottom: 2rem;} .stat-card{ width: 100%; min-width: 0;} .notification{ right: 1rem; left: 1rem; bottom: 1rem;}}
    </style>
</head>

<body>
    <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
        <symbol id="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3c-.05.32-.08.66-.08 1a8 8 0 0 0 8 8c.34 0 .68-.03 1-.08Z" />
        </symbol>
        <symbol id="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </symbol>
        <symbol id="icon-search" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <path d="m20 20-3.5-3.5" />
        </symbol>
        <symbol id="icon-check-circle" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <path d="m8.5 12 2.5 2.5 4.5-5" />
        </symbol>
        <symbol id="icon-external-link" viewBox="0 0 24 24">
            <path d="M14 3h7v7" />
            <path d="M10 14 21 3" />
            <path d="M21 14v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h6" />
        </symbol>
        <symbol id="icon-bolt" viewBox="0 0 24 24">
            <path d="M13 2 4 14h6l-1 8 9-12h-6z" />
        </symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="m5 13 4 4L19 7" />
        </symbol>
    </svg>
    <div class="container">
        <header>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <svg class="icon" id="theme-icon" aria-hidden="true" focusable="false">
                    <use id="theme-icon-use" href="#icon-moon"></use>
                </svg>
            </button>
            <h1>Blocklists Collection</h1>
            <p class="subtitle">A curated collection of blocklists for ad blocking and privacy protection</p>

            <div class="controls-row">
                <div class="search-container">
                    <svg class="icon search-icon" aria-hidden="true" focusable="false">
                        <use href="#icon-search"></use>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search blocklists...">
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">Total Lists</div>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading blocklists...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>Source: <a href="https://github.com/fynks/blocklists" target="_blank"
                    rel="noopener noreferrer">github.com/fynks/blocklists</a></p>
            <p>© 2026 Blocklists Collection. All rights reserved.</p>
        </footer>
    </div>

    <div class="notification" id="notification">
        <svg class="icon" aria-hidden="true" focusable="false">
            <use href="#icon-check-circle"></use>
        </svg>
        <span id="notification-text">URL copied to clipboard!</span>
    </div>

    <script>
        // Theme management
        const themeToggle = document.getElementById('theme-toggle');
        const themeIconUse = document.getElementById('theme-icon-use');

        function getIconSvg(name) {
            return `<svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-${name}"></use></svg>`;
        }

        function setThemeIcon(theme) {
            themeIconUse.setAttribute('href', theme === 'dark' ? '#icon-sun' : '#icon-moon');
        }

        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
            setThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            setThemeIcon(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);

        // GitHub API configuration
        const API_BASE = "https://api.github.com/repos/fynks/blocklists/contents/blocklists";
        const RAW_BASE = "https://raw.githubusercontent.com/fynks/blocklists/main/blocklists";
        const JSDELIVR_BASE = "https://cdn.jsdelivr.net/gh/fynks/blocklists@latest/blocklists";

        // Stats elements
        const totalCount = document.getElementById('total-count');

        // Notification
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notification-text');

        // Search functionality
        const searchInput = document.getElementById('search-input');
        const SEARCH_DEBOUNCE_MS = 120;

        // Blocklist data
        let allBlocklists = [];

        function debounce(fn, delay) {
            let timeoutId;
            return (...args) => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => fn(...args), delay);
            };
        }

        function showNotification(message) {
            notificationText.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = `${getIconSvg('check')} Copied!`;
                button.classList.add('btn-success');

                showNotification('URL copied to clipboard!');

                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('btn-success');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                showNotification('Failed to copy URL');
            });
        }

        function formatDisplayName(name) {
            return name.replace(/\.(txt|list)$/, '').split(/[-_.]/)
                .map((word, index, array) =>
                    index === array.length - 1 ?
                        `<code>${word}</code>` :
                        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                ).join(' ');
        }

        function renderBlocklists(blocklists) {
            const contentEl = document.getElementById('content');

            if (blocklists.length === 0) {
                contentEl.innerHTML = `
                    <div class="error">
                        <h3>No Blocklists Found</h3>
                        <p>We couldn't find any blocklists matching your search criteria.</p>
                        <p>Please try a different search term.</p>
                    </div>
                `;
                return;
            }

            const blocklistHTML = blocklists.map(blocklist => `
                <div class="blocklist-card">
                    <div class="blocklist-header">
                        <h2 class="blocklist-title">${formatDisplayName(blocklist.name)}</h2>
                    </div>
                    <div class="url-field">
                        <span class="url-label">Raw URL</span>
                        <div class="blocklist-url">${blocklist.url}</div>
                    </div>
                    <div class="url-field">
                        <span class="url-label">jsDelivr URL</span>
                        <div class="blocklist-url">${blocklist.jsdelivrUrl}</div>
                    </div>
                    <div class="blocklist-actions">
                        <button class="btn btn-outline" onclick="window.open('${blocklist.url}', '_blank')">
                            ${getIconSvg('external-link')} View Raw
                        </button>
                        <button class="btn btn-outline" onclick="window.open('${blocklist.jsdelivrUrl}', '_blank')">
                            ${getIconSvg('bolt')} View jsDelivr
                        </button>
                        <button class="btn btn-primary" onclick="copyToClipboard('${blocklist.url}', this)">
                            ${getIconSvg('copy')} Copy Raw URL
                        </button>
                        <button class="btn btn-primary" onclick="copyToClipboard('${blocklist.jsdelivrUrl}', this)">
                            ${getIconSvg('copy')} Copy jsDelivr URL
                        </button>
                    </div>
                </div>
            `).join('');

            contentEl.innerHTML = `<div class="blocklist-grid">${blocklistHTML}</div>`;
        }

        function updateStats() {
            totalCount.textContent = allBlocklists.length;
        }

        function filterBlocklists() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = allBlocklists.filter(blocklist =>
                blocklist.searchText.includes(searchTerm)
            );
            renderBlocklists(filtered);
        }

        const debouncedFilterBlocklists = debounce(filterBlocklists, SEARCH_DEBOUNCE_MS);

        async function fetchBlocklists() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);

                const data = await response.json();

                // Filter for txt and list files
                allBlocklists = data
                    .filter(item =>
                        item.type === 'file' &&
                        (item.name.endsWith('.txt') || item.name.endsWith('.list'))
                    )
                    .map(item => ({
                        name: item.name,
                        url: `${RAW_BASE}/${item.name}`,
                        jsdelivrUrl: `${JSDELIVR_BASE}/${item.name}`,
                        searchText: `${item.name} ${RAW_BASE}/${item.name} ${JSDELIVR_BASE}/${item.name}`.toLowerCase()
                    }));

                updateStats();
                renderBlocklists(allBlocklists);
            } catch (error) {
                console.error('Error fetching blocklists:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>Error Loading Blocklists</h3>
                        <p>Failed to load blocklists from GitHub: ${error.message}</p>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();

            // Fetch blocklists from GitHub
            fetchBlocklists();

            // Add search event listener
            searchInput.addEventListener('input', debouncedFilterBlocklists);
        });

        // Expose functions to global scope
        window.copyToClipboard = copyToClipboard;
    </script>
</body>

</html>
